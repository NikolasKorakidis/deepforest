<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <mask id="lenses">
      <rect x="0" y="0" width="1600" height="900" fill="#fff"/>
      <circle cx="580" cy="450" r="350" fill="#000"/>
      <circle cx="1020" cy="450" r="350" fill="#000"/>
    </mask>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#000" mask="url(#lenses)"/>
  <g stroke="#000" stroke-width="6" stroke-linecap="square" fill="none">
    <!-- left lens brackets (outer corners) -->
    <polyline points="405,205 335,205 335,275"/>
    <polyline points="405,695 335,695 335,625"/>
    <!-- right lens brackets (outer corners) -->
    <polyline points="1195,205 1265,205 1265,275"/>
    <polyline points="1195,695 1265,695 1265,625"/>
    <!-- center rangefinder line, gapped -->
    <line x1="702" y1="450" x2="770" y2="450" stroke-width="3"/>
    <line x1="830" y1="450" x2="897" y2="450" stroke-width="3"/>
    <!-- small tick below center -->
    <line x1="800" y1="462" x2="800" y2="498" stroke-width="3"/>
  </g>
</svg>
