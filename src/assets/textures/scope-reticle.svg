<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#0a0d09" fill="none">
    <!-- scope tube bezel: double ring -->
    <circle cx="100" cy="100" r="94" stroke-width="1.2" stroke-opacity="0.65"/>
    <circle cx="100" cy="100" r="89" stroke-width="0.6" stroke-opacity="0.4"/>

    <!-- fine crosshair, gapped at center -->
    <line x1="100" y1="6"   x2="100" y2="94"  stroke-width="0.9"/>
    <line x1="6"   y1="100" x2="94"  y2="100" stroke-width="0.9"/>
    <line x1="106" y1="100" x2="194" y2="100" stroke-width="0.9"/>

    <!-- windage ticks (horizontal, mil-style) -->
    <line x1="35"  y1="96" x2="35"  y2="104" stroke-width="0.9"/>
    <line x1="65"  y1="97" x2="65"  y2="103" stroke-width="0.7"/>
    <line x1="135" y1="97" x2="135" y2="103" stroke-width="0.7"/>
    <line x1="165" y1="96" x2="165" y2="104" stroke-width="0.9"/>

    <!-- elevation reference above center (unlabeled, minor) -->
    <line x1="96"  y1="35" x2="104" y2="35" stroke-width="0.7"/>
    <line x1="96"  y1="65" x2="104" y2="65" stroke-width="0.7"/>

    <!-- bullet-drop compensation ladder below center: 100/200/300/400m holds -->
    <line x1="88"  y1="118" x2="112" y2="118" stroke-width="1"/>
    <line x1="90"  y1="136" x2="110" y2="136" stroke-width="0.9"/>
    <line x1="90"  y1="154" x2="110" y2="154" stroke-width="0.9"/>
    <line x1="92"  y1="172" x2="108" y2="172" stroke-width="0.8"/>
  </g>
  <g fill="#9a9488" font-family="'Courier New', monospace" font-size="7" text-anchor="start">
    <text x="114" y="120.5">1</text>
    <text x="112" y="138.5">2</text>
    <text x="112" y="156.5">3</text>
    <text x="110" y="174.5">4</text>
  </g>
  <circle cx="100" cy="100" r="1.5" fill="#c67a3a"/>
</svg>
